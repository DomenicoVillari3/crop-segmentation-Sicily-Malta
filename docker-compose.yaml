version: '3.8'

services:
  minio:
    image: minio/minio
    container_name: minio_v2
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    networks:
      - bigdata-net

  createbuckets:
    image: minio/mc
    container_name: minio-setup_v2
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      until mc alias set myminio http://minio:9000 \"$MINIO_ACCESS_KEY\" \"$MINIO_SECRET_KEY\"; do
        sleep 2;
      done;
      mc mb --ignore-existing myminio/\"$MINIO_BUCKET_NAME\";
      mc anonymous set public myminio/\"$MINIO_BUCKET_NAME\";
      echo 'Bucket sicily-sentinel-data ready.';
      exit 0;
      "
    networks:
      - bigdata-net
# Networks va al livello radice, non identato sotto services
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartfood-api
    ports:
      - "8400:8400"
    environment:
      MINIO_ENDPOINT:     minio:9000
      MINIO_ACCESS_KEY:   ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY:   ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME:  ${MINIO_BUCKET_NAME}
      MINIO_SECURE:       "false"
      MODEL_WEIGHTS_PATH: /${MODEL_WEIGHTS_PATH}
    depends_on:
      - minio
    networks:
      - bigdata-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

networks:
    bigdata-net:
      driver: bridge